name: Release

# A tag is the release (#71): push v1.2.3 and this builds that version for every platform and publishes it as a
# GitHub release. GitHub is the source of truth for "what is the latest version" — the in-app updater will read
# these releases, so what is published here is what an operator gets.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The tag is the version. Strip the leading v so 'v1.2.3' becomes the assembly version 1.2.3, which is
      # what the About dialog and the plugin host-version check read.
      - name: Resolve the version from the tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Self-contained: the operator should not have to install a .NET runtime to run a desktop app.
      - name: Publish
        shell: bash
        run: |
          dotnet publish src/Cockpit.App/Cockpit.App.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:PublishSingleFile=false \
            --output publish/${{ matrix.rid }}

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          cd publish/${{ matrix.rid }}
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            7z a -tzip "../../artifacts/ai-cockpit-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip" .
          else
            tar -czf "../../artifacts/ai-cockpit-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz" .
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
