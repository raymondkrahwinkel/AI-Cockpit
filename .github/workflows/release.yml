name: Release

# A tag is the release (#71): push v1.2.3 and this builds that version for every platform and publishes it as a
# GitHub release. GitHub is the source of truth for "what is the latest version" — the in-app updater will read
# these releases, so what is published here is what an operator gets.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # The release notes are the changelog, not the commit list: pull the [Unreleased] section out before
  # anything is built, so every platform's publish attaches the same curated body. Read-only here — the
  # changelog is only *rolled* into a version (the finalize job below) once the release has gone out.
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract the release notes from CHANGELOG.md
        shell: bash
        run: |
          bash scripts/changelog.sh notes > release-notes.md
          if [ -s release-notes.md ]; then
            echo "Release notes taken from the changelog's [Unreleased] section:"
            cat release-notes.md
          else
            echo "No [Unreleased] entries — the release will fall back to the auto-generated commit list."
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 2

  publish:
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      # The tag is the version. Strip the leading v so 'v1.2.3' becomes the assembly version 1.2.3, which is
      # what the About dialog and the plugin host-version check read.
      - name: Resolve the version from the tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Self-contained: the operator should not have to install a .NET runtime to run a desktop app. Windows is a
      # single file — the .exe you download, double-click, and later overwrite to update — with the bundled plugins
      # embedded in it rather than in a folder beside it. Not trimmed: trimming is what breaks Avalonia's
      # reflection-driven XAML loading; single-file does not.
      - name: Publish
        shell: bash
        run: |
          single_file=false
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            single_file=true
          fi

          dotnet publish src/Cockpit.App/Cockpit.App.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=$single_file \
            -p:IncludeNativeLibrariesForSelfExtract=$single_file \
            -p:Version=${{ steps.version.outputs.version }} \
            --output publish/${{ matrix.rid }}

      # One artifact per platform, and it is the thing you run: an .exe, a .app, an AppImage. The Linux tarball
      # rides along as well, because unpacking a directory on a server is a real use.
      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          version="${{ steps.version.outputs.version }}"
          case "${{ matrix.rid }}" in
            win-x64)
              cp publish/win-x64/Cockpit.App.exe "artifacts/ai-cockpit-$version-win-x64.exe"
              ;;
            osx-arm64)
              scripts/package-macos.sh arm64 "$version"

              # The .dmg for a person (open, drag onto Applications), the zipped bundle for automation.
              mv artifacts/macos/*.dmg "artifacts/ai-cockpit-$version-macos-arm64.dmg"

              # ditto, not zip: it keeps the bundle's symlinks and permissions, and a .app that lost its executable
              # bit is a .app that will not open.
              ditto -c -k --sequesterRsrc --keepParent \
                artifacts/macos/AI-Cockpit.app "artifacts/ai-cockpit-$version-macos-arm64.app.zip"
              rm -rf artifacts/macos
              ;;
            linux-x64)
              tar -czf "artifacts/ai-cockpit-$version-linux-x64.tar.gz" -C publish/linux-x64 .
              ;;
          esac

      # The Windows installer rides alongside the portable exe, as it does in the nightly: the .exe for the
      # operator who wants nothing installed, the Setup.exe for the one who wants it in Program Files with a
      # Start-menu entry and an uninstaller.
      - name: Windows installer
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          scripts/package-windows-installer.ps1 `
            -PublishDir publish/win-x64 `
            -Version "${{ steps.version.outputs.version }}" `
            -OutputPath "artifacts/ai-cockpit-${{ steps.version.outputs.version }}-win-x64-setup.exe"

      # The AppImage rides alongside the tarball, as it does in the nightly — a release that offered less than a
      # nightly would be a strange thing to ask anyone to upgrade to.
      - name: AppImage
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          scripts/package-appimage.sh publish/linux-x64 "${{ steps.version.outputs.version }}"
          mv artifacts/appimage/*.AppImage \
            "artifacts/ai-cockpit-${{ steps.version.outputs.version }}-x86_64.AppImage"
          rm -rf artifacts/appimage

      # The curated notes built once in the changelog job. body_path is the changelog's [Unreleased]
      # section; generate_release_notes then appends the full commit list beneath it, so the release
      # page reads as "what changed, in prose" followed by "every commit, in full". Each platform's
      # job sets the same body — the action replaces rather than accumulates, so it stays idempotent.
      - uses: actions/download-artifact@v8
        with:
          name: release-notes

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true

  # Only now that every platform has published: move the [Unreleased] entries under the version that
  # just shipped and open a fresh empty section, committed back to the default branch. After the
  # release, not before — a build that failed should never leave the changelog claiming it shipped.
  finalize:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Resolve the version from the tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Roll [Unreleased] into this version and commit it back
        shell: bash
        run: |
          bash scripts/changelog.sh roll "${{ steps.version.outputs.version }}" "$(date -u +%Y-%m-%d)"
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "- changed: rolled the changelog's [Unreleased] entries under ${GITHUB_REF_NAME}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
