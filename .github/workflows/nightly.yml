name: Nightly

# A testable build of main (#71), published to one rolling pre-release tagged 'nightly' that is overwritten each
# time. Opting in to nightlies is a choice about which channel you follow, so this is deliberately a
# *pre-release*: a stable channel never sees it.
#
# It does not run on every push. It runs at night, and only when something actually changed since the last one —
# a nightly that is byte-for-byte yesterday's is noise — or whenever you fire it by hand from the Actions tab.
#
# A nightly has no version number to compare (that is what a rolling tag means), so its identity is the commit it
# was built from: <VersionPrefix>-nightly.<run>+<sha>, e.g. 0.3.0-nightly.42+abc1234. "Is there something newer?"
# is answered by the run number; "which nightly am I running?" by the sha, which is the question you actually ask
# when one misbehaves. The version comes from MSBuild rather than being written here, so it cannot drift from what
# the app is.
on:
  schedule:
    # 02:00 UTC — the small hours in Amsterdam, whichever side of daylight saving we are on.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Nothing new on main since the last nightly means there is nothing to build. A manual run always builds:
  # firing it by hand is itself the statement that you want this commit built.
  changes:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — building this commit."
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The commit the nightly tag points at — not the release's targetCommitish, which reports the branch
          # ("main") and would never equal a sha, quietly making this check always say "yes, build".
          published=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/nightly" -q .object.sha 2>/dev/null || echo "")
          head=$(git rev-parse HEAD)

          if [ "$published" = "$head" ]; then
            echo "main is unchanged since the last nightly ($head) — nothing to build."
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "main moved since the last nightly (was '$published', now '$head')."
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: changes
    if: needs.changes.outputs.build == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Ask MSBuild what the version is instead of grepping the XML for it: the first attempt matched the
      # <VersionPrefix> mentioned in a comment rather than the property, and -P does not exist in macOS's grep
      # at all. The build system already knows the answer.
      - name: Build the nightly version string
        id: version
        shell: bash
        run: |
          base=$(dotnet msbuild src/Cockpit.App/Cockpit.App.csproj -getProperty:VersionPrefix | tr -d '[:space:]')
          echo "version=${base}-nightly.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Self-contained: nobody should have to install a .NET runtime to try a nightly.
      #
      # Windows publishes as a single file — one .exe you download and double-click, and the same one file you
      # overwrite to update. The bundled plugins are embedded in it (EmbedBundledPlugins in Cockpit.App.csproj)
      # rather than sitting in a folder beside it, or "one file" would be a lie. Not trimmed: trimming is what
      # actually breaks Avalonia's reflection-driven XAML loading — single-file does not, with
      # IncludeNativeLibrariesForSelfExtract.
      #
      # Linux and macOS stay a directory publish, because their one-file forms are built from it: the AppImage
      # wraps it, and a .app bundle is a directory by definition.
      - name: Publish
        shell: bash
        run: |
          single_file=false
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            single_file=true
          fi

          dotnet publish src/Cockpit.App/Cockpit.App.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=$single_file \
            -p:IncludeNativeLibrariesForSelfExtract=$single_file \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:SourceRevisionId=${{ steps.version.outputs.sha }} \
            --output publish/${{ matrix.rid }}

      # One thing per platform, and it is the thing you actually run: an .exe on Windows, a .app on macOS, an
      # AppImage on Linux (below). The tarball rides along for Linux only, where unpacking a directory on a
      # server is a real use — a zip of loose DLLs is not something anybody wants to be handed.
      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          case "${{ matrix.rid }}" in
            win-x64)
              cp publish/win-x64/Cockpit.App.exe "artifacts/ai-cockpit-nightly-win-x64.exe"
              ;;
            osx-arm64)
              scripts/package-macos.sh arm64 "${{ steps.version.outputs.version }}"
              # Zipped with ditto: it keeps the bundle's symlinks and permissions, which a plain zip flattens —
              # and a .app whose executable bit was lost is a .app that will not open.
              ditto -c -k --sequesterRsrc --keepParent \
                artifacts/macos/AI-Cockpit.app "artifacts/ai-cockpit-nightly-macos-arm64.app.zip"
              rm -rf artifacts/macos
              ;;
            linux-x64)
              tar -czf "artifacts/ai-cockpit-nightly-linux-x64.tar.gz" -C publish/linux-x64 .
              ;;
          esac

      # An AppImage as well as the tarball, and not instead of it: the tarball is what you unpack on a server or
      # feed to a package build, the AppImage is what a person double-clicks. Built from the publish that already
      # happened, so both artifacts are the same bytes.
      - name: AppImage
        if: matrix.rid == 'linux-x64'
        shell: bash
        run: |
          scripts/package-appimage.sh publish/linux-x64 "${{ steps.version.outputs.version }}"
          mv artifacts/appimage/*.AppImage "artifacts/ai-cockpit-nightly-x86_64.AppImage"
          rm -rf artifacts/appimage

      # Hand the build to the release job rather than publishing from here. Three jobs each uploading into one
      # rolling release means a platform that fails leaves its predecessor's bytes sitting next to the others:
      # the release page then looks complete while being a mixture of two builds, which is worse than a nightly
      # that visibly failed.
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.rid }}
          path: artifacts/*
          retention-days: 2

  # One publish, after every platform built. All three or none.
  release:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Version
        id: version
        shell: bash
        run: |
          base=$(dotnet msbuild src/Cockpit.App/Cockpit.App.csproj -getProperty:VersionPrefix | tr -d '[:space:]')
          echo "version=${base}-nightly.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Delete and recreate rather than update: an existing release keeps its old assets and — the part that
      # bites — its old tag, so 'nightly' kept pointing at the commit before last while the page claimed the new
      # one. The tag is what the next run's "did anything change?" check reads, so a tag that never moves means a
      # nightly that rebuilds identical bytes every night.
      - name: Publish the rolling nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly \
            --target "${GITHUB_SHA}" \
            --prerelease \
            --title "Nightly ${{ steps.version.outputs.version }} (${{ steps.version.outputs.sha }})" \
            --notes "Rolling build of \`main\`, replaced whenever main moves. Not a release: things here are expected to break.

          Version: \`${{ steps.version.outputs.version }}\` · commit \`${{ steps.version.outputs.sha }}\`" \
            artifacts/*
